  <!-- Tassel cord -->
  <line x1="26.5" y1="10" x2="26.5" y2="13.5" stroke="#F5A623" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Tassel knot -->
  <circle cx="26.5" cy="14.6" r="1.15" fill="#F5A623"/>
  <!-- S-curve (sports science · movement · rehabilitation) -->
  <path d="M25 16 Q25 13 20 13 Q15 13 15 19 Q15 22 20 22 Q25 22 25 28 Q25 31 20 31 Q15 31 15 27"
        stroke="white" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
