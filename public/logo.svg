<svg width="512" height="512" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#071020"/>
      <stop offset="100%" stop-color="#1B3A8C"/>
    </linearGradient>
    <linearGradient id="sh" x1="20" y1="11" x2="20" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Background badge -->
  <rect width="40" height="40" rx="9" fill="url(#bg)"/>
  <!-- Shield -->
  <path d="M8 11 L32 11 L32 20 Q32 28 20 34 Q8 28 8 20 Z"
