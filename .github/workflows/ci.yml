name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + type-check ─────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (tsc --noEmit)
        run: npm run lint

  # ── Unit / integration tests ──────────────────────────────────────────────
  unit:
    name: Unit tests + coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vitest — run with coverage
        run: npx vitest run --coverage
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          # Secret was created as VITE_SUPABASE_ANON_KEY; code now reads VITE_SUPABASE_PUBLISHABLE_KEY
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Secret was created as VITE_PADDLE_CLIENT_TOKEN; code now reads VITE_PAYMENTS_CLIENT_TOKEN
          VITE_PAYMENTS_CLIENT_TOKEN: ${{ secrets.VITE_PADDLE_CLIENT_TOKEN }}
          VITE_PADDLE_PRICE_MEDICAL_GERMAN: ${{ secrets.VITE_PADDLE_PRICE_MEDICAL_GERMAN }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build verification
    runs-on: ubuntu-latest
    needs: [lint, unit]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # build:ci uses --mode ci so vite.config.ts assertPaddleTokenForMode()
      # returns early (non-production mode). The live Paddle token is only
      # required for the real deployment build (npm run build), which runs
      # outside CI with the live_ token available. This build verifies that
      # TypeScript compiles, all imports resolve, and the bundle can be created.
      - name: Build (CI mode — no live Paddle token required)
        run: npm run build:ci
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PADDLE_PRICE_MEDICAL_GERMAN: ${{ secrets.VITE_PADDLE_PRICE_MEDICAL_GERMAN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── E2E (Playwright) ──────────────────────────────────────────────────────
  # Disabled until test accounts and secrets are provisioned.
  # See e2e/SETUP.md for setup instructions.
  # To enable: remove the `if: false` line below.
  e2e:
    name: E2E tests (Playwright) [disabled]
    runs-on: ubuntu-latest
    needs: build
    if: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PAYMENTS_CLIENT_TOKEN: ${{ secrets.VITE_PADDLE_CLIENT_TOKEN }}
          VITE_PADDLE_PRICE_MEDICAL_GERMAN: ${{ secrets.VITE_PADDLE_PRICE_MEDICAL_GERMAN }}
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          E2E_INSTRUCTOR_EMAIL: ${{ secrets.E2E_INSTRUCTOR_EMAIL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
