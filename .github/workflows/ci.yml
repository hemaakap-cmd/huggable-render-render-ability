name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + type-check ─────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Migration safety guard (block read-blocking RESTRICTIVE FOR ALL)
        run: npm run check:migrations

      - name: Lint (tsc --noEmit)
        run: npm run lint

  # ── Unit / integration tests ──────────────────────────────────────────────
  unit:
    name: Unit tests + coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vitest — run with coverage
        run: npx vitest run --coverage
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          # Secret was created as VITE_SUPABASE_ANON_KEY; code now reads VITE_SUPABASE_PUBLISHABLE_KEY
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Secret was created as VITE_PADDLE_CLIENT_TOKEN; code now reads VITE_PAYMENTS_CLIENT_TOKEN
          VITE_PAYMENTS_CLIENT_TOKEN: ${{ secrets.VITE_PADDLE_CLIENT_TOKEN }}
          VITE_PADDLE_PRICE_MEDICAL_GERMAN: ${{ secrets.VITE_PADDLE_PRICE_MEDICAL_GERMAN }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build verification
    runs-on: ubuntu-latest
    needs: [lint, unit]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # build:ci uses --mode ci so vite.config.ts assertPaddleTokenForMode()
      # returns early (non-production mode). The live Paddle token is only
      # required for the real deployment build (npm run build), which runs
      # outside CI with the live_ token available. This build verifies that
      # TypeScript compiles, all imports resolve, and the bundle can be created.
      - name: Build (CI mode — no live Paddle token required)
        run: npm run build:ci
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PADDLE_PRICE_MEDICAL_GERMAN: ${{ secrets.VITE_PADDLE_PRICE_MEDICAL_GERMAN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── E2E (Playwright) ──────────────────────────────────────────────────────
  # Runs on every push to main. Coverage is tiered by available secrets:
  #   always              → anonymous specs (public pages + RBAC perimeter)
  #   + SERVICE_ROLE_KEY  → api-* specs (DB trigger/RPC integration tests)
  #   + E2E_PASSWORD      → student/instructor/admin/super-admin portal specs
  #     (personas auto-seeded each run via e2e/seed.mjs — idempotent)
  # Specs self-skip when their tier's secrets are absent, so this job is
  # green from day one and gains depth as secrets are provisioned.
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # The webServer in playwright.config.ts runs `vite preview` in CI,
      # so we must build the bundle the E2E suite will exercise.
      - name: Build app for E2E (CI mode)
        run: npm run build:ci
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PADDLE_PRICE_MEDICAL_GERMAN: ${{ secrets.VITE_PADDLE_PRICE_MEDICAL_GERMAN }}

      - name: Seed E2E personas (only when persona secrets are configured)
        if: ${{ env.SEED_ENABLED == 'true' }}
        run: npm run e2e:seed
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Run Playwright tests
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:8080
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

    env:
      # Persona seeding needs both the service key and the shared password
      SEED_ENABLED: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.E2E_PASSWORD != '' }}
