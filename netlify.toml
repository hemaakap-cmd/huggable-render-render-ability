# Netlify Configuration for SSRA Academy

[build]
  command = "npm run build"
  publish = "dist"

# Single Page App redirect
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=*"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.stripe.com https://*.stripe.network https://pay.google.com https://www.gstatic.com; frame-src 'self' https://*.stripe.com https://*.stripe.network https://pay.google.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.stripe.com https://*.stripe.network https://pay.google.com; img-src 'self' data: https: blob:; style-src 'self' 'unsafe-inline' https://*.stripe.com; font-src 'self' data: https://*.stripe.com; worker-src 'self' blob:;"

# Assets with aggressive caching
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files — no caching (always fetch fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
